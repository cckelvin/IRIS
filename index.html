<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg: #04050a;
    --surface: #0b0d14;
    --surface2: #111420;
    --border: #1c2035;
    --border-bright: #2a3060;
    --accent: #4f7cff;
    --accent-glow: rgba(79,124,255,0.18);
    --accent-dim: #2a4cbf;
    --green: #00e5a0;
    --text: #e8ecf8;
    --text-mid: #7a84a8;
    --text-dim: #3d4468;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.65;
    overflow: hidden;
  }

  /* Subtle grid overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,124,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,124,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow top */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(79,124,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .shell {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(4,5,10,0.85);
    backdrop-filter: blur(16px);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--green));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -1px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--text);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 12px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-mid);
    letter-spacing: 1px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,229,160,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(0,229,160,0); }
  }

  /* ── Scroll area ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px 8px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    scroll-behavior: smooth;
  }

  .scroll-area::-webkit-scrollbar { width: 4px; }
  .scroll-area::-webkit-scrollbar-track { background: transparent; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }

  /* ── Welcome splash ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 60px 20px 20px;
    gap: 12px;
  }

  .welcome-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--green));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 8px;
    box-shadow: 0 0 40px rgba(79,124,255,0.3);
  }

  .welcome h1 {
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
  }

  .welcome p {
    color: var(--text-mid);
    font-size: 14px;
    max-width: 340px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--mono);
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* ── Messages ── */
  .msg-row {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    animation: fadeSlide 0.25s ease both;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .avatar.ai {
    background: linear-gradient(135deg, var(--accent), var(--green));
    color: #fff;
  }

  .avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    color: var(--text-mid);
  }

  .bubble {
    max-width: calc(100% - 56px);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14.5px;
    line-height: 1.7;
  }

  .bubble.ai {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 3px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--accent-dim);
    border: 1px solid rgba(79,124,255,0.3);
    border-top-right-radius: 3px;
    color: #fff;
    text-align: right;
  }

  /* Markdown inside AI bubbles */
  .bubble.ai p { margin-bottom: 0.6em; }
  .bubble.ai p:last-child { margin-bottom: 0; }

  .bubble.ai code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--green);
  }

  .bubble.ai pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .bubble.ai pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 12px;
    color: var(--text);
  }

  .bubble.ai h1, .bubble.ai h2, .bubble.ai h3 {
    font-family: var(--mono);
    letter-spacing: 0.5px;
    margin: 12px 0 6px;
    color: var(--accent);
  }

  .bubble.ai h1 { font-size: 16px; }
  .bubble.ai h2 { font-size: 14px; }
  .bubble.ai h3 { font-size: 13px; }

  .bubble.ai ul, .bubble.ai ol {
    padding-left: 20px;
    margin: 6px 0;
  }

  .bubble.ai li { margin: 3px 0; }

  .bubble.ai blockquote {
    border-left: 3px solid var(--accent);
    padding: 6px 14px;
    margin: 8px 0;
    color: var(--text-mid);
    background: var(--surface2);
    border-radius: 0 6px 6px 0;
  }

  .bubble.ai a {
    color: var(--accent);
    text-decoration: none;
  }

  .bubble.ai a:hover { text-decoration: underline; }

  /* Thinking / loading */
  .thinking {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 6px 0;
  }

  .thinking span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s infinite;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── Input area ── */
  .input-wrapper {
    flex-shrink: 0;
    padding: 12px 20px 20px;
    background: rgba(4,5,10,0.92);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
  }

  .input-box {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,124,255,0.12);
  }

  textarea {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    padding: 14px 16px 6px;
    resize: none;
    min-height: 52px;
    max-height: 160px;
    overflow-y: auto;
    line-height: 1.6;
  }

  textarea::placeholder { color: var(--text-dim); }

  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px 8px 16px;
  }

  .model-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .send-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .send-btn:hover:not(:disabled) {
    background: #6b91ff;
    transform: translateY(-1px);
  }

  .send-btn:active:not(:disabled) { transform: translateY(0); }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .send-btn svg { width: 12px; height: 12px; }

  /* ── Error ── */
  .error-bubble {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    color: #ff6b6b;
    font-size: 13px;
    font-family: var(--mono);
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .scroll-area { padding: 20px 14px 8px; }
    .input-wrapper { padding: 10px 10px 16px; }
  }
</style>
</head>
<body>

<div class="shell">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">IR</div>
      <span class="logo-text">IRIS</span>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      ONLINE
    </div>
  </header>

  <!-- Chat scroll area -->
  <div class="scroll-area" id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">◈</div>
      <h1>IRIS AI</h1>
      <p>Powered by Claude. Ask anything — code, analysis, creativity, or just a conversation.</p>
      <div class="chips">
        <div class="chip" onclick="quickSend('Explain quantum entanglement simply')">Quantum entanglement</div>
        <div class="chip" onclick="quickSend('Write a Python web scraper')">Python scraper</div>
        <div class="chip" onclick="quickSend('What are the best productivity habits?')">Productivity habits</div>
        <div class="chip" onclick="quickSend('Debug this: console.log(undefined.length)')">Debug JS error</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-wrapper">
    <div class="input-box">
      <textarea
        id="input"
        placeholder="Ask anything..."
        rows="2"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <div class="input-footer">
        <span class="model-badge">claude-sonnet-4</span>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 8L2 2L5 8L2 14L14 8Z" fill="currentColor"/>
          </svg>
          SEND
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // Configure marked
  marked.setOptions({ breaks: true, gfm: true });

  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const conversationHistory = [];

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function quickSend(text) {
    input.value = text;
    autoResize(input);
    sendMessage();
  }

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendRow(content, role) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? 'IR' : 'YOU';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;

    if (role === 'ai') {
      bubble.innerHTML = marked.parse(content);
    } else {
      bubble.textContent = content;
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function appendThinking() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = 'thinking-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = 'IR';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ai';
    bubble.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinking-row');
    if (el) el.remove();
  }

  function appendError(msg) {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = 'IR';
    const bubble = document.createElement('div');
    bubble.className = 'error-bubble';
    bubble.textContent = '⚠ ' + msg;
    row.appendChild(avatar);
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    removeWelcome();
    appendRow(text, 'user');
    conversationHistory.push({ role: 'user', content: text });

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    appendThinking();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'You are IRIS, a sharp and helpful AI assistant. Be concise but thorough. Use markdown for code blocks, lists, and headers where appropriate.',
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeThinking();

      if (data.content && data.content[0]) {
        const reply = data.content.map(b => b.text || '').join('');
        conversationHistory.push({ role: 'assistant', content: reply });
        appendRow(reply, 'ai');
      } else if (data.error) {
        appendError(data.error.message || 'API error');
      } else {
        appendError('Unexpected response from API.');
      }
    } catch (err) {
      removeThinking();
      appendError('Network error: ' + err.message);
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
    </html>
