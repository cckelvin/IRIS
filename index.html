<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris | Neural Intelligence</title>
    
    <link rel="icon" type="image/png" href="https://files.oaiusercontent.com/file-ae1e8bc6-915a-4669-a773-363f289aff30?se=2026-03-24T18%3A05%3A31Z&sp=r&sv=24.12&sr=b&rscc=max-age%3D604800%2C%20immutable%2C%20private&rscd=attachment%3B%20filename%3Dfile_000000004dcc7243ae84a03894d49daa.png&sig=S9W7xHnK7M186mZ7eU6F/Wf1Yy7Y%2BMYgH7j8Y8%2BZ8P0%3D">
    <link rel="apple-touch-icon" href="https://files.oaiusercontent.com/file-ae1e8bc6-915a-4669-a773-363f289aff30?se=2026-03-24T18%3A05%3A31Z&sp=r&sv=24.12&sr=b&rscc=max-age%3D604800%2C%20immutable%2C%20private&rscd=attachment%3B%20filename%3Dfile_000000004dcc7243ae84a03894d49daa.png&sig=S9W7xHnK7M186mZ7eU6F/Wf1Yy7Y%2BMYgH7j8Y8%2BZ8P0%3D">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9642654497024204" crossorigin="anonymous"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --grok-blue: #1d9bf0; --iris-bg: #000000; }
        body { background-color: var(--iris-bg); color: #ffffff; font-family: 'Space Grotesk', sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; overflow: hidden; }
        
        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; items-center; justify-content: center; transition: opacity 0.8s ease; }
        .splash-logo { width: 120px; height: 120px; border-radius: 30px; margin-bottom: 20px; box-shadow: 0 0 30px rgba(29,155,240,0.3); }

        /* Bigger Orb */
        .status-orb { width: 18px; height: 18px; background-color: var(--grok-blue); border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px var(--grok-blue); transition: 0.3s; }
        .status-orb:hover { transform: scale(1.2); }

        /* Tables & Layout */
        #chat-container { flex: 1; overflow-y: auto; padding: 1rem; scroll-behavior: smooth; }
        @media (min-width: 768px) { #chat-container { padding: 3rem 20%; } }
        .ai-message { border-left: 2px solid var(--grok-blue); background: linear-gradient(90deg, rgba(29, 155, 240, 0.05) 0%, transparent 100%); margin-bottom: 2.5rem; padding: 1.5rem; }
        .iris-table { width: 100%; border-collapse: collapse; margin: 15px 0; background: rgba(255,255,255,0.02); }
        .iris-table th { color: var(--grok-blue); text-align: left; padding: 10px; border-bottom: 1px solid var(--grok-blue); font-size: 10px; text-transform: uppercase; }
        .iris-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }

        #history-overlay { position: fixed; inset: 0; background: #000; z-index: 500; padding: 40px; display: none; overflow-y: auto; }
        .hidden { display: none !important; }
        .grok-input-area { background: rgba(22, 24, 28, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="splash">
        <img src="https://files.oaiusercontent.com/file-ae1e8bc6-915a-4669-a773-363f289aff30?se=2026-03-24T18%3A05%3A31Z&sp=r&sv=24.12&sr=b&rscc=max-age%3D604800%2C%20immutable%2C%20private&rscd=attachment%3B%20filename%3Dfile_000000004dcc7243ae84a03894d49daa.png&sig=S9W7xHnK7M186mZ7eU6F/Wf1Yy7Y%2BMYgH7j8Y8%2BZ8P0%3D" class="splash-logo animate-pulse">
        <p class="text-blue-500 font-bold tracking-[0.5em] text-xs uppercase">Initializing Iris</p>
    </div>

    <div id="history-overlay">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-bold">Neural History</h2>
                <button onclick="toggleHistory()" class="bg-white/10 px-4 py-2 rounded-full text-xs">Close</button>
            </div>
            <div id="history-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="auth-screen" class="fixed inset-0 bg-black z-50 flex items-center justify-center p-6">
        <div id="login-card" class="w-full max-w-sm bg-[#0d1117] border border-gray-800 p-8 rounded-[2rem]">
            <h2 class="text-3xl font-bold text-center mb-8">Iris <span class="text-blue-500">AI</span></h2>
            <input id="email" type="email" placeholder="Email" class="w-full bg-black border border-gray-800 p-4 rounded-xl mb-4 text-white outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full bg-black border border-gray-800 p-4 rounded-xl mb-8 text-white outline-none">
            <button id="loginBtn" class="w-full bg-white text-black font-bold py-4 rounded-xl mb-4">Login</button>
            <button id="signupBtn" class="w-full bg-[#16181c] text-gray-400 border border-gray-800 py-4 rounded-xl">Create Account</button>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center bg-black border-b border-white/5">
        <div class="flex items-center gap-4">
            <div id="orb-trigger" class="status-orb" onclick="toggleHistory()"></div>
            <span class="font-bold text-[10px] tracking-widest uppercase opacity-70">IRIS INTELLIGENCE</span>
        </div>
        <button id="logoutBtn" class="text-[10px] border border-white/10 px-4 py-2 rounded-full font-bold">SIGN OUT</button>
    </header>

    <main id="chat-container"></main>

    <footer class="p-6 md:p-10 bg-black">
        <div class="max-w-3xl mx-auto relative">
            <div class="grok-input-area flex items-center p-2 rounded-[28px]">
                <input id="query" type="text" placeholder="Direct your inquiry to Iris..." class="flex-1 bg-transparent px-6 py-4 outline-none text-white">
                <button id="execBtn" class="bg-blue-600 text-white p-3 rounded-full">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 12h14m-7-7l7 7-7 7"/></svg>
                </button>
            </div>
        </div>
    </footer>

    <script>
        (function() {
            const URL = "https://wzjzjciojzmrntltkaar.supabase.co";
            const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6anpqY2lvanptcm50bHRrYWFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMDY4MjIsImV4cCI6MjA4OTg4MjgyMn0.E3I2y88ths7AvrsvCqsAJ5gf464ij0xZ6NBSvxd4Drs";
            const CSE_KEY = "AIzaSyCM7rgQ8J-Rw2fIyURuga-KfNDW3dZn9r4";
            const CSE_CX = "c7c4ecb03db19434e";

            const sb = window.supabase.createClient(URL, KEY);
            let activeSession = null;

            // Remove splash
            setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').remove(), 800); }, 2000);

            async function checkUser() {
                const { data: { user } } = await sb.auth.getUser();
                if (user) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    startSession();
                }
            }

            async function startSession() {
                const { data } = await sb.from('sessions').insert([{ title: "Link " + new Date().toLocaleTimeString() }]).select();
                if (data) activeSession = data[0].id;
                render("Iris initialized. Command me.", "ai");
            }

            window.toggleHistory = async function() {
                const overlay = document.getElementById('history-overlay');
                overlay.style.display = (overlay.style.display === 'block') ? 'none' : 'block';
                if(overlay.style.display === 'block') {
                    const { data } = await sb.from('sessions').select('*').order('created_at', { ascending: false });
                    document.getElementById('history-list').innerHTML = data.map(s => `<div class="p-4 border border-white/5 rounded-xl text-sm font-bold bg-white/5">${s.title} <span class="block opacity-30 font-normal text-[10px]">${new Date(s.created_at).toLocaleString()}</span></div>`).join('');
                }
            }

            function synthesize(data, q) {
                const query = q.toLowerCase();
                if (query === "hi") return "My intelligence is focused on you. What is your request?";
                
                if (query.includes("list") || query.includes("table") || query.includes("compare")) {
                    let rows = data.items.slice(0, 4).map(i => {
                        const val = i.snippet.match(/[\$£€]\d+(?:\.\d+)?|[0-9]{2,10}(?:\s?\w+)?/g)?.[0] || "No Meta";
                        return `<tr><td>${i.title.substring(0, 20)}</td><td class="text-blue-400 font-bold">${val}</td><td>${i.snippet.substring(0, 50)}...</td></tr>`;
                    }).join('');
                    return `<table class="iris-table"><tr><th>Entity</th><th>Metric</th><th>Context</th></tr>${rows}</table>`;
                }

                let text = data.items.map(i => i.snippet).join(" ").replace(/\b\w+\s\d{1,2},\s\d{4}\b/g, "").substring(0, 600);
                return `Extracted Intelligence: <br><br> ${text}...`;
            }

            async function performSearch() {
                const q = document.getElementById("query").value.trim();
                if (!q) return; render(q, "user"); document.getElementById("query").value = "";
                try {
                    const res = await fetch(`https://www.googleapis.com/customsearch/v1?key=${CSE_KEY}&cx=${CSE_CX}&q=${encodeURIComponent(q)}`);
                    const data = await res.json();
                    render(synthesize(data, q), "ai");
                } catch (e) { render("Disruption detected.", "ai"); }
            }

            function render(text, type) {
                const div = document.createElement("div");
                div.className = type === "user" ? "flex justify-end mb-8" : "ai-message";
                div.innerHTML = `<div class="${type === 'user' ? 'bg-blue-600 text-white px-5 py-2 rounded-2xl text-sm' : 'text-md'}">${text}</div>`;
                document.getElementById("chat-container").appendChild(div);
                document.getElementById("chat-container").scrollTop = document.getElementById("chat-container").scrollHeight;
            }

            document.getElementById('execBtn').onclick = performSearch;
            document.getElementById('query').onkeypress = (e) => { if(e.key === 'Enter') performSearch(); };
            document.getElementById('loginBtn').onclick = async () => {
                const { error } = await sb.auth.signInWithPassword({ email: email.value, password: password.value });
                if (!error) checkUser();
            };
            document.getElementById('logoutBtn').onclick = async () => { await sb.auth.signOut(); location.reload(); };
            window.onload = checkUser;
        })();
    </script>
</body>
</html>
