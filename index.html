<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris AI | Grok Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000; color: #e5e7eb; font-family: ui-sans-serif, system-ui; overflow: hidden; }
        #chat-container { height: calc(100vh - 160px); overflow-y: auto; scroll-behavior: smooth; }
        .user-bubble { background: #262626; border-radius: 1.25rem; padding: 0.75rem 1rem; align-self: flex-end; max-width: 80%; margin: 10px 0; border: 1px solid #333; }
        .ai-response { align-self: flex-start; width: 100%; margin: 15px 0; border-left: 2px solid #3b82f6; padding-left: 1.5rem; }
        .source-tag { font-size: 0.7rem; color: #60a5fa; background: rgba(59, 130, 246, 0.1); padding: 2px 6px; border-radius: 4px; margin-right: 5px; }
        #chat-container::-webkit-scrollbar { display: none; }
        .loader { width: 12px; height: 12px; border: 2px solid #3b82f6; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="auth-screen" class="fixed inset-0 bg-black z-50 flex items-center justify-center p-4">
        <div id="login-card" class="w-full max-w-sm bg-[#0d1117] border border-gray-800 p-8 rounded-2xl shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-2 text-center">Iris <span class="text-blue-500">AI</span></h2>
            <p class="text-gray-500 text-sm text-center mb-8">Login to save your search history.</p>
            <input id="email" type="email" placeholder="Email" class="w-full bg-black border border-gray-700 p-3 rounded-lg mb-4 outline-none focus:border-blue-500 text-white">
            <input id="password" type="password" placeholder="Password" class="w-full bg-black border border-gray-700 p-3 rounded-lg mb-6 outline-none focus:border-blue-500 text-white">
            <button id="loginBtn" class="w-full bg-white text-black font-bold py-3 rounded-lg mb-3 hover:bg-gray-200 transition">Login</button>
            <button id="signupBtn" class="w-full bg-transparent border border-gray-700 text-white py-3 rounded-lg hover:bg-gray-800 transition">Create Account</button>
            <p id="auth-msg" class="text-xs mt-4 text-center text-gray-400"></p>
        </div>

        <div id="otp-card" class="w-full max-w-sm bg-[#0d1117] border border-gray-800 p-8 rounded-2xl shadow-2xl hidden">
            <h2 class="text-2xl font-bold text-white mb-2 text-center">Verify Email</h2>
            <p class="text-gray-500 text-sm text-center mb-8">Enter the 6-digit code sent to your email.</p>
            <input id="otp-code" type="text" placeholder="000000" maxlength="6" class="w-full bg-black border border-gray-700 p-4 text-center text-2xl tracking-[1rem] rounded-lg mb-6 outline-none focus:border-blue-500 text-white">
            <button id="verifyBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg mb-3 hover:bg-blue-500 transition">Verify Code</button>
            <button id="backBtn" class="w-full bg-transparent text-gray-500 text-sm hover:text-white">Back to Login</button>
            <p id="otp-msg" class="text-xs mt-4 text-center text-red-500"></p>
        </div>
    </div>

    <header class="p-4 border-b border-gray-900 flex justify-between items-center bg-black/50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
            <span class="font-bold text-lg tracking-tight">IRIS <span class="text-gray-500 font-normal text-xs ml-1">V2.4</span></span>
        </div>
        <button id="logoutBtn" class="text-xs text-gray-500 hover:text-white px-3 py-1 border border-gray-800 rounded-full">Logout</button>
    </header>

    <main id="chat-container" class="flex-1 p-4 md:p-8 max-w-4xl mx-auto w-full flex flex-col"></main>

    <div id="status" class="hidden px-8 py-2 text-xs text-blue-400 max-w-4xl mx-auto w-full">
        <span class="loader mr-2"></span> Searching live web results...
    </div>

    <footer class="p-4 bg-black border-t border-gray-900">
        <div class="max-w-3xl mx-auto flex bg-[#16181c] rounded-2xl border border-gray-800 px-4 py-2 focus-within:border-blue-500/50 transition-all">
            <input id="query" type="text" placeholder="Search with Iris..." class="flex-1 bg-transparent p-2 outline-none text-white text-sm">
            <button id="execBtn" class="text-white hover:text-blue-500 px-2 transition-colors">↑</button>
        </div>
    </footer>

    <script>
        // Use a self-executing function to keep the scope clean and avoid "already declared" errors
        (function() {
            const URL = "https://wzjzjciojzmrntltkaar.supabase.co";
            const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6anpqY2lvanptcm50bHRrYWFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMDY4MjIsImV4cCI6MjA4OTg4MjgyMn0.E3I2y88ths7AvrsvCqsAJ5gf464ij0xZ6NBSvxd4Drs";
            const CSE_KEY = "AIzaSyCM7rgQ8J-Rw2fIyURuga-KfNDW3dZn9r4";
            const CSE_CX = "c7c4ecb03db19434e";

            const sb = window.supabase.createClient(URL, KEY);
            let activeSession = null;

            // UI Elements
            const loginCard = document.getElementById('login-card');
            const otpCard = document.getElementById('otp-card');
            const authScreen = document.getElementById('auth-screen');
            const chatContainer = document.getElementById("chat-container");
            const queryInput = document.getElementById("query");

            async function checkUser() {
                const { data: { user } } = await sb.auth.getUser();
                if (user) {
                    authScreen.classList.add('hidden');
                    startSession();
                }
            }

            async function startSession() {
                const { data } = await sb.from('sessions').insert([{ title: "Research Session" }]).select();
                if (data) activeSession = data[0].id;
                render("Iris initialized. Search engine connected via Google CSE.", "ai");
            }

            function render(text, type) {
                const div = document.createElement("div");
                div.className = type === "user" ? "user-bubble" : "ai-response";
                div.innerHTML = `<div class="text-sm leading-relaxed">${text}</div>`;
                chatContainer.appendChild(div);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            async function performSearch() {
                const q = queryInput.value.trim();
                if (!q) return;
                render(q, "user");
                queryInput.value = "";
                document.getElementById("status").classList.remove("hidden");

                try {
                    const res = await fetch(`https://www.googleapis.com/customsearch/v1?key=${CSE_KEY}&cx=${CSE_CX}&q=${encodeURIComponent(q)}`);
                    const data = await res.json();
                    document.getElementById("status").classList.add("hidden");

                    if (data.items) {
                        let html = `<p class='mb-2 opacity-50 text-[10px] uppercase font-bold'>Verified Search Results</p>`;
                        data.items.slice(0, 3).forEach((item, i) => {
                            html += `<div class='mb-4'><span class='source-tag'>0${i+1}</span><a href='${item.link}' target='_blank' class='text-blue-400 underline'>${item.title}</a><p class='text-gray-400 text-xs mt-1'>${item.snippet}</p></div>`;
                        });
                        render(html, "ai");
                        if (activeSession) await sb.from('messages').insert([{ session_id: activeSession, user_text: q, ai_text: data.items[0].snippet }]);
                    } else {
                        render("No results found.", "ai");
                    }
                } catch (e) {
                    document.getElementById("status").classList.add("hidden");
                    render("Search error.", "ai");
                }
            }

            // Event Listeners (Added via JS to avoid 'defined' errors)
            document.getElementById('loginBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) {
                    if (error.message.includes("confirmed")) { loginCard.classList.add('hidden'); otpCard.classList.remove('hidden'); }
                    else document.getElementById('auth-msg').innerText = error.message;
                } else checkUser();
            };

            document.getElementById('signupBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { error } = await sb.auth.signUp({ email, password });
                if (error) document.getElementById('auth-msg').innerText = error.message;
                else { loginCard.classList.add('hidden'); otpCard.classList.remove('hidden'); }
            };

            document.getElementById('verifyBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const token = document.getElementById('otp-code').value;
                const { error } = await sb.auth.verifyOtp({ email, token, type: 'signup' });
                if (error) document.getElementById('otp-msg').innerText = error.message;
                else checkUser();
            };

            document.getElementById('logoutBtn').onclick = async () => { await sb.auth.signOut(); location.reload(); };
            document.getElementById('execBtn').onclick = performSearch;
            queryInput.onkeypress = (e) => { if(e.key === 'Enter') performSearch(); };
            document.getElementById('backBtn').onclick = () => { otpCard.classList.add('hidden'); loginCard.classList.remove('hidden'); };

            window.onload = checkUser;
        })();
    </script>
</body>
              </html>
